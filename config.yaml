# Agent Evaluator MVP Configuration

agent:
  adapter: openai_fc
  model: gpt-4o-mini            # Change to gpt-4o / claude-sonnet-4-20250514 etc.
  api_key: ${OPENAI_API_KEY}    # Set via environment variable
  base_url: ~                   # Set if using a proxy or compatible API
  temperature: 0.0

environment:
  type: mock_db

evaluators:
  - state_match
  - action_match
  - info_delivery

scenarios: scenarios/sample_tasks.json

# Run settings
run:
  num_trials: 1                 # Run each task N times (for pass^k)
  log_level: INFO
