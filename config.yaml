# Agent Evaluator MVP Configuration

agent:
  adapter: openai_fc
  model: glm-4.7 # 智谱模型，也可用 glm-4 / glm-4-plus
  api_key: ${ZHIPU_API_KEY} # 通过环境变量设置，不要明文写在这里
  base_url: https://open.bigmodel.cn/api/paas/v4 # 智谱 OpenAI 兼容端点
  temperature: 0.0

environment:
  type: mock_db

evaluators:
  - state_match
  - action_match
  - info_delivery

scenarios: scenarios/sample_tasks.json

# Run settings
run:
  num_trials: 1 # Run each task N times (for pass^k)
  log_level: INFO
