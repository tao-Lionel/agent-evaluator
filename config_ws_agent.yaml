# ============================================================
# WebSocket Agent 评估配置 — Amazon 评论分析助手
# ============================================================

name: "Amazon评论分析助手"

agent:
  adapter: ws_bot
  ws_url: "ws://192.168.11.18:8501/ws/chat"
  timeout: 120

environment:
  type: passthrough

evaluators:
  - name: llm_judge
    model: MiniMax-M2.7
    base_url: "https://api.minimax.chat/v1"
    api_key: ${MINIMAX_API_KEY}
    max_tokens: 4096
  - name: nl_assertion
    model: MiniMax-M2.7
    base_url: "https://api.minimax.chat/v1"
    api_key: ${MINIMAX_API_KEY}
    max_tokens: 4096
  - info_delivery

scenarios: scenarios/ws_agent_tasks.json

run:
  num_trials: 1
  log_level: INFO
